services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vibecoder
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -proot --silent"]
      interval: 3s
      timeout: 5s
      retries: 20

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://root:root@db:3306/vibecoder
      SESSION_SECRET: ${SESSION_SECRET:-01234567890123456789012345678901}
      COOKIE_SECURE: "false"
      RUN_SEED_ON_START: "1"
      SEED_USER_VITYA_PASSWORD: ${SEED_USER_VITYA_PASSWORD:-vitya12345}
      SEED_USER_PASHA_PASSWORD: ${SEED_USER_PASHA_PASSWORD:-pasha12345}
      SEED_USER_SEGA_PASSWORD: ${SEED_USER_SEGA_PASSWORD:-sega12345}
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysqldata:
